# ===================================================================
# 博客系统 CI 流水线
# 触发: push to main / pull_request
# ===================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# 取消同一 PR 的重复运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  # 后端测试用数据库 (CI 环境使用 service containers)
  DATABASE_URL: postgresql://blog_admin:blog_secret_ci@localhost:5432/blog_db_ci?schema=public
  REDIS_URL: redis://localhost:6379
  JWT_ACCESS_SECRET: ci-test-access-secret-key-minimum-32-chars-long
  JWT_REFRESH_SECRET: ci-test-refresh-secret-key-minimum-32-chars-long

jobs:
  # =================================================================
  # Job 1: Lint — 代码规范检查
  # =================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint (${{ matrix.workspace }})
        run: npm -w ${{ matrix.workspace }} run lint

  # =================================================================
  # Job 2: Type Check — TypeScript 类型检查
  # =================================================================
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 后端需要先生成 Prisma Client 才能通过类型检查
      - name: Generate Prisma Client
        if: matrix.workspace == 'backend'
        run: npm -w backend run db:generate

      - name: Run Type Check (${{ matrix.workspace }})
        run: npm -w ${{ matrix.workspace }} run type-check

  # =================================================================
  # Job 3: Build — 构建验证
  # =================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        if: matrix.workspace == 'backend'
        run: npm -w backend run db:generate

      - name: Build (${{ matrix.workspace }})
        run: npm -w ${{ matrix.workspace }} run build

  # =================================================================
  # Job 4: Test — 单元测试 + E2E 测试
  # =================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, type-check] # 只在前两步通过后运行

    services:
      # PostgreSQL 16 测试数据库
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: blog_admin
          POSTGRES_PASSWORD: blog_secret_ci
          POSTGRES_DB: blog_db_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis 7 缓存
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm -w backend run db:generate

      - name: Run Prisma Migrations
        run: npx prisma migrate deploy --schema=backend/prisma/schema.prisma

      # 后端单元测试
      - name: Run Backend Tests
        run: npm -w backend run test

      # 前端单元测试
      - name: Run Frontend Tests
        run: npm -w frontend run test

  # =================================================================
  # Job 5: 结果汇总
  # =================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, build, test]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## CI 流水线结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ 部分检查未通过，请查看上方详细信息。" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 所有检查通过！" >> $GITHUB_STEP_SUMMARY
