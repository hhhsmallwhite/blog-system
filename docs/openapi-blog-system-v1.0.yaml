            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '200':
          description: 重置成功
        '400':
          description: Token无效或已过期(40002)
        '422':
          description: 密码不符合强度(42201)

