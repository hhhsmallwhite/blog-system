      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        '200':
          description: 修改成功（撤销所有RefreshToken）
        '401':
          description: 当前密码错误(40106)
        '422':
          description: 新密码不符合强度(42201)

