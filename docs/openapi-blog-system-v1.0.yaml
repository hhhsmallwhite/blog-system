    patch:
      tags: [Admin]
      summary: 修改用户角色
      operationId: updateUserRoles
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRoleUpdateRequest'
      responses:
        '200':
          description: 成功

  # === Analytics ===
  /analytics/views:
    post:
      tags: [Analytics]
      summary: 记录文章阅读
      operationId: recordView
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ViewRecordRequest'
      responses:
        '200':
          description: 已记录

  /analytics/trends:
    get:
      tags: [Analytics]
      summary: 获取整体统计趋势
      operationId: getTrends
      security:
        - BearerAuth: []
      parameters:
        - name: period
          in: query
          schema: { type: string, enum: [7d, 30d, 90d], default: 30d }
        - name: metric
          in: query
          schema: { type: string, enum: [views, visitors, comments], default: views }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 0 }
                  data:
                    $ref: '#/components/schemas/TrendsResponse'
